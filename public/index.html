<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InnerMirror · Mira</title>
<style>
/* FONTS */
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Nunito:wght@300;400;500;600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #130a06; 
  --surface: #1e0f08;
  --surface2: #2a1510;
  --amber: #c8783a; 
  --amber-light: #e8a870;
  --cream: #f0e4d0;
  --cream-dim: #c8b49a;
  --cream-muted: #8a7464;
  --border: rgba(200, 120, 58, 0.14);
}

body {
  font-family: 'Nunito', sans-serif;
  background-color: var(--bg);
  color: var(--cream);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* ── THE BACKGROUND ── */
canvas#bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 2;
  transition: opacity 0.65s ease, transform 0.65s ease;
}

.screen.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }

/* ── WELCOME ── */
#welcome { padding: 24px; text-align: center; max-width: 420px; width: 100%; margin: 0 auto; }

.mira-hero {
  position: relative;
  width: 120px; height: 120px;
  margin: 0 auto 25px;
}

.mira-face {
  width: 120px; height: 120px;
  border-radius: 50%;
  overflow: hidden;
  position: relative;
  z-index: 1;
  border: 1px solid var(--border);
  background: radial-gradient(circle at 30% 30%, #2a1510 0%, #130a06 100%);
  display: flex; align-items: center; justify-content: center;
}

.brand-name { font-family: 'Playfair Display', serif; font-size: 34px; color: var(--cream); letter-spacing: -0.5px; margin-bottom: 2px; }
.brand-name em { font-style: italic; color: var(--amber-light); }
.brand-sub { font-size: 11px; color: var(--cream-muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; font-weight: 500; }
.mira-tagline { font-size: 14px; color: rgba(200, 180, 155, 0.55); font-style: italic; margin-bottom: 35px; }

.mcards { display: flex; flex-direction: column; gap: 10px; width: 100%; }
.mcard {
  padding: 16px 20px; border-radius: 16px;
  border: 1px solid var(--border);
  background: rgba(30, 15, 8, 0.7);
  cursor: pointer; text-align: left;
  transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  backdrop-filter: blur(10px);
}
.mcard:hover { border-color: var(--amber); background: rgba(42, 21, 16, 0.85); transform: translateX(8px); }
.mc-t { font-size: 14.5px; color: var(--cream-dim); font-weight: 600; margin-bottom: 2px; }
.mc-h { font-size: 12px; color: var(--cream-muted); font-weight: 300; }

/* ── CHAT SCREEN ── */
#chatscreen { width: 100%; max-width: 600px; height: 100vh; display: flex; flex-direction: column; }

.chat-header {
  padding: 15px 20px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(19, 10, 6, 0.95);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(16px);
}
.h-left { display: flex; align-items: center; gap: 12px; }
.h-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  background: var(--surface);
}
.h-name { font-family: 'Playfair Display', serif; font-style: italic; font-size: 19px; color: var(--cream); }
.h-status { font-size: 11px; color: #6db87a; font-weight: 400; letter-spacing: 0.5px; }
.h-back { font-size: 10.5px; padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); color: var(--cream-muted); cursor: pointer; background: transparent; transition: 0.2s; }
.h-back:hover { border-color: var(--amber); color: var(--amber-light); }

.chat-area {
  flex: 1; overflow-y: auto;
  padding: 20px 24px;
  display: flex; flex-direction: column;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.chat-area::-webkit-scrollbar { width: 3px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); }

.date-tag { text-align: center; font-size: 11px; color: var(--cream-muted); margin: 10px auto 25px; padding: 4px 14px; border-radius: 12px; background: rgba(255,255,255,0.03); }

/* ── MESSAGES ── */
.msg-group { display: flex; flex-direction: column; margin-bottom: 18px; max-width: 82%; }
.msg-group.mira { align-self: flex-start; }
.msg-group.user { align-self: flex-end; align-items: flex-end; }

.bubble {
  padding: 12px 18px;
  border-radius: 18px;
  font-size: 15.5px;
  line-height: 1.6;
  position: relative;
}
.msg-group.mira .bubble {
  background-color: var(--surface2);
  border: 1px solid rgba(200, 120, 58, 0.1);
  color: var(--cream-dim);
  border-top-left-radius: 4px;
}
.msg-group.user .bubble {
  background: rgba(200, 120, 58, 0.15);
  border: 1px solid rgba(200, 120, 58, 0.2);
  color: var(--cream);
  border-top-right-radius: 4px;
}
.msg-time { font-size: 10px; color: var(--cream-muted); margin-top: 6px; padding: 0 4px; opacity: 0.7; }

/* ── TYPING ── */
.typing-bubble {
  padding: 14px 20px;
  background: var(--surface2);
  border-radius: 4px 18px 18px 18px;
  width: fit-content;
}
.t-dots { display: flex; gap: 5px; }
.t-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--amber); opacity: 0.3; animation: tdot 1.4s infinite; }
.t-dot:nth-child(2) { animation-delay: 0.2s; }
.t-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes tdot { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.15); } }

/* ── INPUT ── */
.input-section {
  padding: 15px 20px 20px;
  background: rgba(19, 10, 6, 0.98);
  border-top: 1px solid var(--border);
}
.ibox {
  display: flex; gap: 12px; align-items: flex-end;
  background: rgba(26, 13, 7, 0.8);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 10px 10px 10px 20px;
  transition: border-color 0.3s;
}
.ibox:focus-within { border-color: var(--amber-light); }
textarea {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--cream); font-family: inherit; font-size: 15px;
  line-height: 1.5; resize: none; max-height: 120px;
}
textarea::placeholder { color: var(--cream-muted); opacity: 0.5; }
.send-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--amber); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s, background 0.2s;
}
.send-btn:hover:not(:disabled) { background: var(--amber-light); transform: scale(1.05); }
.send-btn:disabled { opacity: 0.2; cursor: default; }
.send-btn svg { width: 18px; height: 18px; fill: white; margin-left: 2px; }

.fnote { text-align: center; font-size: 10px; color: var(--cream-muted); margin-top: 10px; opacity: 0.4; font-weight: 300; }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="screen" id="welcome">
  <div id="welcome-inner">
    <div class="mira-hero">
      <div class="mira-face">
        <svg viewBox="0 0 100 100" width="90" height="90" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 20 Q38 25 40 48 Q42 68 53 78 Q56 81 55 90" stroke="#e8a870" stroke-width="1.8" fill="none" stroke-linecap="round"/>
            <path d="M48 18 Q68 18 64 48 Q62 65 54 75" stroke="#c8783a" stroke-width="1.2" fill="none" opacity="0.6"/>
            <path d="M40 30 Q30 40 35 60" stroke="#c8783a" stroke-width="1" fill="none" opacity="0.4"/>
            <circle cx="64" cy="42" r="1.3" fill="#e8a870" opacity="0.7"/>
        </svg>
      </div>
    </div>
    <div class="brand-name">inner<em>mirror</em></div>
    <div class="brand-sub">meet mira</div>
    <div class="mira-tagline">your wise, emotionally intelligent companion</div>
    <div class="mcards">
      <div class="mcard" onclick="startChat('advice')">
        <div class="mc-t">i need psychological insight</div>
        <div class="mc-h">effective, wise advice for complex situations.</div>
      </div>
      <div class="mcard" onclick="startChat('understand')">
        <div class="mc-t">help me understand them</div>
        <div class="mc-h">break down their confusing behavior.</div>
      </div>
    </div>
  </div>
</div>

<div class="screen hidden" id="chatscreen">
  <div class="chat-header">
    <div class="h-left">
      <div class="h-avatar">
        <svg viewBox="0 0 100 100" width="30" height="30">
            <path d="M50 25 Q42 28 44 50 Q46 68 55 75" stroke="#e8a870" stroke-width="3" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="h-name">Mira</div>
        <div class="h-status">online</div>
      </div>
    </div>
    <button class="h-back" onclick="goHome()">← back</button>
  </div>
  <div class="chat-area" id="chatArea"></div>
  <div class="input-section">
    <div class="ibox">
      <textarea id="inp" placeholder="Message Mira..." rows="1" onkeydown="onKey(event)" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
      <button class="send-btn" id="sbtn" onclick="send()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="fnote">companion, not a therapist.</div>
  </div>
</div>

<script>
/* ── STAR ENGINE ── */
(function(){
  const c=document.getElementById('bg'),ctx=c.getContext('2d');
  let W,H,stars=[];
  function init(){
    W=c.width=window.innerWidth;H=c.height=window.innerHeight;
    stars=Array.from({length:100},()=>({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*0.8+0.2, o:Math.random(),
      s:Math.random()*0.002+0.0005
    }));
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{
      const alpha=0.1+Math.abs(Math.sin(Date.now()*s.s+s.o)*0.4);
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(240,225,200,${alpha})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',init);init();draw();
})();

/* ── THE EQ BRAIN ── */
const MIRA_PROMPT = `You are Mira, an EQ Expert and Psychological Strategist. 
GOAL: Provide wise, sensible, and effective advice in plain, simple language.
BEHAVIOR: 
- be a warm, older-sister figure. 
- use psychological realism: explain WHY people feel or act a certain way (e.g. ego, insecurity, attachment).
- give clear, actionable next steps. 
- use lowercase only. keep messages short (1-3 sentences).
- use [BREAK] to separate distinct thoughts for a multi-bubble effect.
- use emojis like a real person (✨, 🕊️, 💙, 🔍) — naturally, but not overused.
- never say "i understand." instead, mirror the situation with wisdom.`;

let mode='advice', history=[], busy=false;

function getTime(){const n=new Date(); return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');}
function goHome(){document.getElementById('chatscreen').classList.add('hidden');document.getElementById('welcome').classList.remove('hidden');}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}

async function renderMira(text){
  const ca=document.getElementById('chatArea');
  const parts=text.split('[BREAK]').map(p=>p.trim()).filter(Boolean);
  
  for(let i=0; i<parts.length; i++){
    showTyping();
    await new Promise(r=>setTimeout(r, 800 + parts[i].length*18));
    hideTyping();
    
    const g=document.createElement('div');
    g.className='msg-group mira';
    g.innerHTML=`<div class="bubble">${parts[i].toLowerCase()}</div>`;
    
    if(i === parts.length - 1){
      const t=document.createElement('div'); t.className='msg-time'; t.textContent=getTime();
      g.appendChild(t);
    }
    
    ca.appendChild(g); ca.scrollTop=ca.scrollHeight;
    if(i < parts.length - 1) await new Promise(r=>setTimeout(r, 500));
  }
}

function renderUser(text){
  const ca=document.getElementById('chatArea');
  const g=document.createElement('div'); g.className='msg-group user';
  g.innerHTML=`<div class="bubble">${text}</div><div class="msg-time">${getTime()}</div>`;
  ca.appendChild(g); ca.scrollTop=ca.scrollHeight;
}

function showTyping(){
  const ca=document.getElementById('chatArea');
  const d=document.createElement('div'); d.id='typing'; d.className='msg-group mira';
  d.innerHTML=`<div class="typing-bubble"><div class="t-dots"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div></div>`;
  ca.appendChild(d); ca.scrollTop=ca.scrollHeight;
}
function hideTyping(){const e=document.getElementById('typing'); if(e)e.remove();}

async function send(){
  const inp=document.getElementById('inp'); const val=inp.value.trim();
  if(!val || busy) return;
  inp.value=''; inp.style.height='auto'; busy=true; document.getElementById('sbtn').disabled=true;
  
  renderUser(val);
  history.push({role:'user', content:val});
  
  try {
    const res = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:MIRA_PROMPT, messages:history})
    });
    const data = await res.json();
    history.push({role:'assistant', content:data.reply});
    await renderMira(data.reply);
  } catch(e) { await renderMira("i'm having a quiet moment... let me try again. 🕊️"); }
  
  busy=false; document.getElementById('sbtn').disabled=false;
}

function startChat(m){
  mode=m; history=[];
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('chatscreen').classList.remove('hidden');
  document.getElementById('chatArea').innerHTML='<div class="date-tag">Today</div>';
  const greet = m==='advice' ? "i'm here. what's weighing on your mind? 🕊️" : "tell me about them. what's the situation? 🔍";
  renderMira(greet);
}
</script>
</body>
</html>
