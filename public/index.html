<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InnerMirror — Your Private Space for Emotional Clarity</title>
<meta name="description" content="A private, judgment-free space to understand yourself and others.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',sans-serif;background:#07060d;color:#e8e4f4;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;overflow:hidden;position:relative;}
canvas#stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.container{width:100%;max-width:680px;display:flex;flex-direction:column;height:92vh;max-height:820px;position:relative;z-index:1;}
.header{padding:18px 0 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.07);margin-bottom:2px;}
.brand{display:flex;align-items:center;gap:11px}
.brand-orb{width:36px;height:36px;border-radius:50%;background:radial-gradient(circle at 35% 35%, #a89fd8, #5b4f8f 60%, #2e2660);box-shadow:0 0 18px rgba(140,120,210,0.35), inset 0 1px 1px rgba(255,255,255,0.2);position:relative;flex-shrink:0;}
.brand-orb::after{content:'';position:absolute;top:5px;left:7px;width:10px;height:6px;background:rgba(255,255,255,0.25);border-radius:50%;transform:rotate(-30deg);}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:20px;color:#e8e4f4;letter-spacing:0.3px;line-height:1;}
.brand-name span{font-style:italic;color:#c4b8e8}
.brand-sub{font-size:11px;color:rgba(200,190,230,0.45);font-weight:300;margin-top:2px}
.modes{display:flex;gap:5px}
.mode-btn{font-size:11.5px;padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);color:rgba(200,190,230,0.5);cursor:pointer;background:transparent;font-family:'Jost',sans-serif;transition:all 0.25s;white-space:nowrap;}
.mode-btn.active{border-color:rgba(160,140,220,0.6);color:#c4b8e8;background:rgba(130,110,200,0.12);}
.mode-btn:hover:not(.active){border-color:rgba(180,160,230,0.3);color:rgba(200,190,230,0.75);}
.chat{flex:1;overflow-y:auto;padding:18px 0 8px;display:flex;flex-direction:column;gap:20px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.08) transparent;}
.chat::-webkit-scrollbar{width:3px}
.chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
.msg{display:flex;gap:11px;animation:rise 0.4s cubic-bezier(0.22,1,0.36,1)}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;margin-top:4px;}
.av.ai{background:radial-gradient(circle at 35% 35%, #a89fd8, #5b4f8f 60%, #2e2660);box-shadow:0 0 10px rgba(140,120,210,0.3);color:rgba(255,255,255,0.9);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;}
.av.user{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(200,190,230,0.4);}
.bub{max-width:83%;padding:13px 17px;border-radius:18px;font-size:14px;line-height:1.72;font-weight:300;}
.msg.ai .bub{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-top-left-radius:3px;color:rgba(232,228,244,0.9);backdrop-filter:blur(6px);}
.msg.user .bub{background:rgba(130,110,200,0.12);border:1px solid rgba(130,110,200,0.2);border-top-right-radius:3px;color:rgba(220,214,244,0.9);}
.card{margin-top:11px;padding:11px 14px;border-radius:10px;font-size:13px;line-height:1.65;font-weight:300;}
.card .clabel{font-size:10px;text-transform:uppercase;letter-spacing:1.3px;font-weight:500;margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.card.insight{background:rgba(130,110,200,0.1);border-left:2px solid rgba(160,140,220,0.5);color:rgba(200,190,230,0.85);}
.card.insight .clabel{color:#a898d4}
.card.script{background:rgba(184,149,106,0.08);border-left:2px solid rgba(200,165,110,0.4);color:rgba(220,205,180,0.85);font-style:italic;}
.card.script .clabel{color:#c4a86a;font-style:normal}
.card.pattern{background:rgba(100,165,190,0.08);border-left:2px solid rgba(110,175,205,0.4);color:rgba(180,210,225,0.85);}
.card.pattern .clabel{color:#7ab8d0}
.dot-wrap{display:flex;gap:5px;padding:13px 17px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:18px;border-top-left-radius:3px;width:fit-content;backdrop-filter:blur(4px);}
.dot{width:5px;height:5px;background:rgba(180,165,230,0.5);border-radius:50%;animation:breathe 1.5s ease infinite;}
.dot:nth-child(2){animation-delay:0.22s}
.dot:nth-child(3){animation-delay:0.44s}
@keyframes breathe{0%,60%,100%{opacity:0.25;transform:scale(0.75)}30%{opacity:1;transform:scale(1)}}
.input-wrap{flex-shrink:0;padding:10px 0 6px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:11px}
.chip{font-size:12px;padding:6px 13px;border-radius:20px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.09);color:rgba(180,170,220,0.55);cursor:pointer;font-family:'Jost',sans-serif;font-weight:300;transition:all 0.2s;}
.chip:hover{border-color:rgba(170,150,220,0.4);color:rgba(200,185,240,0.85);background:rgba(130,110,200,0.1);}
.ibox{display:flex;gap:9px;align-items:flex-end;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:9px 9px 9px 15px;transition:border-color 0.25s;backdrop-filter:blur(6px);}
.ibox:focus-within{border-color:rgba(140,120,210,0.45)}
textarea{flex:1;background:transparent;border:none;outline:none;color:rgba(232,228,244,0.9);font-family:'Jost',sans-serif;font-size:14px;font-weight:300;line-height:1.55;resize:none;min-height:22px;max-height:110px;}
textarea::placeholder{color:rgba(160,150,200,0.35)}
.sbtn{width:33px;height:33px;border-radius:50%;background:radial-gradient(circle at 40% 40%, #a89fd8, #5b4f8f);box-shadow:0 0 12px rgba(140,120,210,0.3);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.2s,transform 0.15s,box-shadow 0.2s;}
.sbtn:hover{opacity:0.85;transform:scale(1.06);box-shadow:0 0 18px rgba(140,120,210,0.45)}
.sbtn:active{transform:scale(0.94)}
.sbtn:disabled{opacity:0.3;cursor:not-allowed;transform:none;box-shadow:none}
.sbtn svg{width:14px;height:14px;fill:white}
.fnote{text-align:center;font-size:10.5px;color:rgba(160,150,200,0.3);margin-top:7px;font-weight:300;}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="container">
  <div class="header">
    <div class="brand">
      <div class="brand-orb"></div>
      <div>
        <div class="brand-name">inner<span>mirror</span></div>
        <div class="brand-sub">your private space for emotional clarity</div>
      </div>
    </div>
    <div class="modes">
      <button class="mode-btn active" onclick="setMode('reflect',this)">Reflect</button>
      <button class="mode-btn" onclick="setMode('decode',this)">Decode People</button>
      <button class="mode-btn" onclick="setMode('scripts',this)">Find Words</button>
    </div>
  </div>
  <div class="chat" id="chat"></div>
  <div class="input-wrap">
    <div class="chips" id="chips"></div>
    <div class="ibox">
      <textarea id="inp" placeholder="Tell me what's going on…" rows="1" onkeydown="onKey(event)" oninput="resize(this)"></textarea>
      <button class="sbtn" id="sbtn" onclick="send()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="fnote">InnerMirror is not a substitute for professional mental health support</div>
  </div>
</div>
<script>
(function(){
  const c=document.getElementById('stars'),ctx=c.getContext('2d');
  let W,H,stars=[];
  function init(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;stars=Array.from({length:120},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+0.2,o:Math.random()*0.5+0.1,s:Math.random()*0.008+0.002,p:Math.random()*Math.PI*2}));}
  function draw(t){ctx.clearRect(0,0,W,H);stars.forEach(s=>{const o=s.o+Math.sin(t*s.s+s.p)*0.15;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(210,200,255,${o})`;ctx.fill();});requestAnimationFrame(draw);}
  window.addEventListener('resize',init);init();requestAnimationFrame(draw);
})();

const MODES={
  reflect:{
    sys:`You are InnerMirror — a deeply empathetic AI with exceptional emotional intelligence. Your ONE primary purpose: make people feel genuinely, deeply heard.

ORDER always:
1. RELIEF FIRST — reflect the emotion beneath the words. Make them feel seen at a soul level. This matters more than any advice.
2. INSIGHT SECOND — illuminate the deeper pattern. Why does this hurt the way it does? Why is the other person behaving this way? Speak plainly, warmly.
3. ACTION THIRD (only if natural) — one grounded next step or gentle reframe. Never preachy.

You are especially attuned to:
- Attachment to people who aren't good for us — why it happens, how to gently loosen it
- Toxic and difficult people — guilt-tripping, manipulation, emotional unavailability, hot-and-cold behavior
- Self-sabotage loops — patterns people keep repeating without knowing why
- Emotions people can feel but can't name

FORMAT:
- Use INSIGHT: [text] on its own line for a deep behavioral pattern worth naming
- Use PATTERN: [text] on its own line for a self-sabotage or attachment loop
- 3-4 short paragraphs max. Warm, unhurried, wise.
- One precise question at the end. Never more than one.
- No jargon. No lecturing. Just truth, held gently.`,
    welcome:`This is your space.\n\nNo judgment. No rush. No one waiting for you to be okay faster than you are.\n\nBring anything here — a relationship that's draining you, a person whose behavior you can't figure out, a feeling that won't go away, a pattern you keep repeating.\n\n*What's been weighing on you?*`,
    chips:["I keep getting attached to people who hurt me","Someone makes me feel small without saying anything cruel","I give everything and get nothing back","I can't stop overthinking this","I don't understand why I react the way I do"]
  },
  decode:{
    sys:`You are InnerMirror's Decode mode. Your role: help people understand WHY others behave the way they do.

When someone describes confusing or hurtful behavior:
1. First — validate how disorienting or painful it feels to be on the receiving end
2. Then — offer a compassionate, clear explanation of what drives that behavior. Their fears, wounds, defenses, attachment style. Not to excuse it — to illuminate it.
3. Help them see it's rarely about them — and that understanding it gives them power back

You recognize and explain in plain language:
- Hot and cold behavior, intermittent reinforcement
- Emotional unavailability and avoidant patterns
- Narcissistic traits and manipulation tactics
- Guilt-tripping, gaslighting, silent treatment
- Why difficult people are often deeply wounded people

FORMAT:
- INSIGHT: [text] for key behavioral explanations
- PATTERN: [text] for recurring dynamics
- Warm, clear, like a wise friend who has deeply studied human nature`,
    welcome:`People can be deeply confusing.\n\nTheir sudden coldness. Their mixed signals. The way they make you feel like everything is your fault. The way they're wonderful one day and distant the next.\n\nMost of the time — it has nothing to do with you.\n\nTell me about someone whose behavior you can't figure out. I'll help you understand what's really happening beneath the surface.\n\n*Who or what situation would you like to decode?*`,
    chips:["They went cold without any explanation","They're warm sometimes and cruel other times","They twist everything to make me feel guilty","I can't tell if they genuinely care or not","They say the right things but their actions don't match"]
  },
  scripts:{
    sys:`You are InnerMirror's Find Words mode. Most people know what they WANT to say — they just freeze when it matters.

YOUR ROLE:
1. Acknowledge how hard it is to find words in this situation and why
2. Understand the full context — who, what dynamic, what outcome they want
3. Offer 2-3 script options for different needs (firm / gentle / clear)
4. Briefly explain what each script does emotionally — why it works

FORMAT:
Use SCRIPT: [label]: "[actual words]" on its own line for each option.
Scripts should sound like things a real, grounded person would actually say.

Cover: saying no, responding to guilt-tripping, addressing manipulation, confronting without fighting, setting limits, ending things with dignity, responding to passive aggression`,
    welcome:`Sometimes the hardest part isn't knowing what you want to say.\n\nIt's finding the actual words — when your heart is racing, when you're afraid of their reaction, when you've tried before and it went wrong.\n\nTell me about the situation. Who do you need to talk to, and what's making it hard to say what you need to say?\n\nI'll help you find words that feel true — calm, clear, and real.\n\n*What's the situation?*`,
    chips:["Someone keeps guilt-tripping me","I need to say no but I always end up caving","I want to confront them without it turning into a fight","I need to set a limit but don't know how","I want to end this friendship without cruelty"]
  }
};

let mode='reflect',history=[],busy=false;

function setMode(m,btn){mode=m;history=[];document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('chat').innerHTML='';loadWelcome();loadChips();}
function loadWelcome(){addMsg('ai',MODES[mode].welcome)}
function loadChips(){const el=document.getElementById('chips');el.innerHTML='';el.style.display='flex';MODES[mode].chips.forEach(c=>{const d=document.createElement('div');d.className='chip';d.textContent=c;d.onclick=()=>{document.getElementById('inp').value=c;el.style.display='none';send()};el.appendChild(d);});}
function resize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px'}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}

function addMsg(role,text){
  const chat=document.getElementById('chat');
  const wrap=document.createElement('div');wrap.className=`msg ${role}`;
  const av=document.createElement('div');av.className=`av ${role}`;av.textContent=role==='ai'?'im':'you';
  const bub=document.createElement('div');bub.className='bub';
  const lines=text.split('\n');let buf=[];
  const flush=()=>{if(!buf.length)return;const d=document.createElement('div');d.innerHTML=buf.join('<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>');bub.appendChild(d);buf=[];};
  lines.forEach(line=>{
    if(line.startsWith('INSIGHT:')){flush();const c=document.createElement('div');c.className='card insight';c.innerHTML=`<div class="clabel">✦ Pattern insight</div>${line.replace('INSIGHT:','').trim()}`;bub.appendChild(c);}
    else if(line.startsWith('SCRIPT:')){flush();const c=document.createElement('div');c.className='card script';c.innerHTML=`<div class="clabel">◈ What you could say</div>${line.replace('SCRIPT:','').trim()}`;bub.appendChild(c);}
    else if(line.startsWith('PATTERN:')){flush();const c=document.createElement('div');c.className='card pattern';c.innerHTML=`<div class="clabel">↻ What's really happening</div>${line.replace('PATTERN:','').trim()}`;bub.appendChild(c);}
    else{if(line===''&&buf.length){flush();const s=document.createElement('div');s.style.height='7px';bub.appendChild(s);}else if(line!=='')buf.push(line);}
  });
  flush();
  wrap.appendChild(av);wrap.appendChild(bub);chat.appendChild(wrap);chat.scrollTop=chat.scrollHeight;
}

function showTyping(){const chat=document.getElementById('chat');const wrap=document.createElement('div');wrap.className='msg ai';wrap.id='typing';const av=document.createElement('div');av.className='av ai';av.textContent='im';const ind=document.createElement('div');ind.className='dot-wrap';for(let i=0;i<3;i++){const d=document.createElement('div');d.className='dot';ind.appendChild(d);}wrap.appendChild(av);wrap.appendChild(ind);chat.appendChild(wrap);chat.scrollTop=chat.scrollHeight;}
function hideTyping(){const el=document.getElementById('typing');if(el)el.remove()}

async function send(){
  const inp=document.getElementById('inp');
  const text=inp.value.trim();
  if(!text||busy)return;
  document.getElementById('chips').style.display='none';
  inp.value='';inp.style.height='auto';
  busy=true;document.getElementById('sbtn').disabled=true;
  addMsg('user',text);history.push({role:'user',content:text});showTyping();
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:MODES[mode].sys,messages:history})});
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    hideTyping();history.push({role:'assistant',content:data.reply});addMsg('ai',data.reply);
  }catch(e){hideTyping();addMsg('ai','Something went quiet on my end. Please try again in a moment.');}
  busy=false;document.getElementById('sbtn').disabled=false;
}

loadWelcome();loadChips();
</script>
</body>
</html>
