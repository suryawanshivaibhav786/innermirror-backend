<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mira</title>
<style>
/* --- PROFESSIONAL TYPOGRAPHY: Elegant Serifs --- */
@import url('https://fonts.googleapis.com/css2?family=Ibarra+Real+Nova:ital,wght@1,500;1,600;1,700&family=Nunito:wght@300;400;500;600&display=swap');

/* RESET & CORE */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #130a06; 
  --amber: #c8783a; 
  --gold: #e8a870;
  --cream: #f0e4d0;
  --cream-dim: #c8b49a;
  --cream-muted: #8a7464;
  --border: rgba(200, 120, 58, 0.14);
}
body { font-family: 'Nunito', sans-serif; background-color: var(--bg); color: var(--cream); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }

/* ── THE BACKGROUND STAR ENGINE ── */
canvas#bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
.screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2; transition: opacity 0.65s ease, transform 0.65s ease; }
.screen.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }

/* ── WELCOME ── */
#welcome { padding: 40px 20px; text-align: center; max-width: 420px; width: 100%; }
.mira-hero { position: relative; width: 140px; height: 140px; margin: 0 auto 35px; }

/* The 'Pretty' Refined Face Frame */
.mira-face {
    width: 140px; height: 140px; border-radius: 50%; overflow: hidden; position: relative;
    z-index: 1; border: 1px solid var(--border);
    background: radial-gradient(circle at 30% 30%, #2a1510 0%, #130a06 100%);
    display: flex; align-items: center; justify-content: center;
}

/* ELEGANT TYPOGRAPHY: Dusk Serif */
.mira-name { 
    font-family: 'Ibarra Real Nova', serif; 
    font-style: italic; 
    font-size: 48px; 
    font-weight: 600;
    color: var(--gold); 
    margin-bottom: 35px; 
    letter-spacing: -1px;
}

.mcards { display: flex; flex-direction: column; gap: 12px; width: 100%; }
.mcard {
  padding: 18px 24px; border-radius: 12px; border: 1px solid var(--border);
  background: rgba(30, 15, 8, 0.7); cursor: pointer; text-align: center;
  transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); backdrop-filter: blur(10px);
  /* Matching Elegant Typography */
  font-family: 'Ibarra Real Nova', serif; font-style: italic; font-size: 17px; color: var(--cream-dim); font-weight: 500;
}
.mcard:hover { border-color: var(--amber); background: rgba(42, 21, 16, 0.85); transform: translateY(-3px); }

/* ── CHAT SCREEN ── */
#chatscreen { width: 100%; max-width: 650px; height: 100vh; display: flex; flex-direction: column; }
.chat-header {
  padding: 18px 25px; display: flex; align-items: center; justify-content: space-between;
  background: rgba(19, 10, 6, 0.96); border-bottom: 1px solid var(--border); backdrop-filter: blur(20px);
}
.h-identity { display: flex; align-items: center; gap: 12px; }
.h-avatar { width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; background: #1e0f08; }
.h-online { width: 9px; height: 9px; border-radius: 50%; background: #6db87a; position: absolute; bottom: 2px; right: 2px; border: 1.5px solid var(--bg); }
.h-name { font-family: 'Ibarra Real Nova', serif; font-style: italic; font-size: 20px; color: var(--gold); }
.h-status { font-size: 11px; color: var(--cream-muted); font-weight: 300; }
.btn-back { font-size: 11px; padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); color: var(--cream-muted); cursor: pointer; background: transparent; transition: 0.2s; }
.btn-back:hover { border-color: var(--amber); color: var(--gold); }

.chat-area { flex: 1; overflow-y: auto; padding: 25px 25px 15px; display: flex; flex-direction: column; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.chat-area::-webkit-scrollbar { width: 3px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); }

.date-tag { text-align: center; font-size: 11px; color: var(--cream-muted); margin: 10px auto 25px; padding: 4px 14px; border-radius: 12px; background: rgba(255,255,255,0.03); }

/* --- MESSAGE FLOW --- */
.msg { display: flex; flex-direction: column; margin-bottom: 18px; max-width: 82%; }
.msg.mira { align-self: flex-start; }
.msg.user { align-self: flex-end; align-items: flex-end; }
.bubble { padding: 12px 18px; border-radius: 18px; font-size: 15.5px; line-height: 1.6; position: relative; }
.msg.mira .bubble { background: #261812; border: 1px solid rgba(200, 120, 58, 0.1); color: var(--cream-dim); border-top-left-radius: 4px; }
.msg.user .bubble { background: rgba(200, 120, 58, 0.15); color: var(--cream); border-top-right-radius: 4px; }
.msg-time { font-size: 10px; color: var(--cream-muted); margin-top: 6px; padding: 0 4px; opacity: 0.7; }

/* Typing Animation */
.typing-wrap { display: flex; gap: 4px; padding: 15px; }
.t-dot { width: 6px; height: 6px; background: var(--amber); border-radius: 50%; opacity: 0.3; animation: tdot 1.4s infinite; }
.t-dot:nth-child(2) { animation-delay: 0.2s; } .t-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes tdot { 0%,100% {opacity:0.3;transform:scale(1)} 50% {opacity:1;transform:scale(1.1)} }

/* --- INPUT --- */
.input-section { padding: 15px 25px 30px; background: rgba(19, 10, 6, 0.98); border-top: 1px solid var(--border); }
.ibox { display: flex; gap: 12px; align-items: flex-end; background: #1a0d07; border: 1px solid var(--border); border-radius: 30px; padding: 10px 10px 10px 20px; transition: border-color 0.3s; }
textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--cream); font-family: inherit; font-size: 15.5px; line-height: 1.5; resize: none; max-height: 120px; }
.btn-send { width: 42px; height: 42px; border-radius: 50%; background: var(--amber); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
.btn-send:hover { background: var(--gold); transform: scale(1.05); }
.btn-send svg { width: 18px; height: 18px; fill: white; margin-left: 2px; }
.btn-send:disabled { opacity: 0.2; }
.fnote { text-align: center; font-size: 10px; color: var(--cream-muted); margin-top: 10px; opacity: 0.4; font-weight: 300; }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="screen" id="welcome">
  <div class="mira-hero">
    <div class="mira-face">
      <svg viewBox="0 0 100 100" width="100" height="100" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" stroke="#e8a870" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
              <path d="M50 20 C40 25 42 45 Q44 60 52 70 Q55 75 54 85 Q54 90 56 95" />
              <path d="M43 65 Q48 70 53 65" stroke-width="1.1" />
              <path d="M45 25 Q30 35 35 55 Q40 70 48 75 Q52 78 50 85" opacity="0.4" />
              <path d="M48 20 Q65 20 62 45 Q60 60 52 70" stroke="#c8783a" stroke-width="0.8" opacity="0.6"/>
              <circle cx="62" cy="38" r="1.3" fill="#e8a870" opacity="0.8" stroke="none" />
              <path d="M62 38 L62 44 M58 41 L66 41" stroke-width="1" />
          </g>
      </svg>
    </div>
  </div>
  <div class="mira-name">mira</div>
  <div class="mcards">
    <div class="mcard" onclick="startChat('talk')">talk</div>
    <div class="mcard" onclick="startChat('advice')">need advice</div>
    <div class="mcard" onclick="startChat('expert')">psychological insight</div>
  </div>
</div>

<div class="screen hidden" id="chatscreen">
  <header class="chat-header">
    <div class="h-identity">
      <div class="h-avatar">
        <svg viewBox="0 0 100 100" width="28" height="28">
          <path d="M40 30 Q30 35 32 55 Q35 70 45 78" stroke="#e8a870" stroke-width="3" fill="none"/>
        </svg>
      </div>
      <div>
        <div class="h-name">mira</div>
        <div class="h-status">online</div>
      </div>
    </div>
    <button class="btn-back" onclick="goHome()">← change</button>
  </header>
  <main class="chat-area" id="chatArea"></main>
  <footer class="input-section">
    <div class="ibox">
      <textarea id="inp" placeholder="Talk to Mira..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
      <button class="btn-send" id="sbtn" onclick="send()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="fnote">companion, not a therapist.</div>
  </div>
</div>

<script>
/* ── STAR ENGINE ── */
(function(){
  const c=document.getElementById('bg'),ctx=c.getContext('2d');
  let W,H,stars=[];
  function init(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;stars=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*0.8+0.2,o:Math.random(),s:Math.random()*0.001+0.0005}));}
  function draw(){ctx.clearRect(0,0,W,H);stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(240,220,190,${0.1+Math.abs(Math.sin(Date.now()*s.s+s.o)*0.3)})`;ctx.fill();});requestAnimationFrame(draw);}
  window.addEventListener('resize',init);init();draw();
})();

/* --- MIRA EQ GOD BRAIN --- */
const SYSTEM = `You are Mira, an EQ expert and psychological strategist. GOAL: Provide actual, wise, sensible, and effective advice in plain, simple, human language. be a warm, older-sister figure. use psychological realism: deeply explain the 'why' of human behavior (ego, fear, insecurity, attachment). LOWERCASE only. 1-3 sentences. use [BREAK] to separate thoughts. use 1-2 emojis naturally (✨, 🕊️, 💙, 🔍). never say "i understand."`;

let mode='advice', history=[], busy=false;

function getTime(){const n=new Date(); return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');}
function goHome(){document.getElementById('chatscreen').classList.add('hidden');document.getElementById('welcome').classList.remove('hidden');}

async function renderMira(text){
  const ca=document.getElementById('chatArea');
  const parts=text.split('[BREAK]').map(p=>p.trim()).filter(Boolean);
  
  for(let p of parts){
    showTyping();
    // Simulate real human typing speed (async delay)
    await new Promise(r => setTimeout(r, 1000 + p.length*16));
    hideTyping();
    
    const d=document.createElement('div'); d.className='msg mira';
    d.innerHTML=`<div class="bubble">${p.toLowerCase()}</div>`;
    ca.appendChild(d); ca.scrollTop=ca.scrollHeight;
    
    // Human break between bubbles
    await new Promise(r=>setTimeout(r, 400));
  }
}

function renderUser(text){
  const ca=document.getElementById('chatArea');
  const d=document.createElement('div'); d.className='msg user';
  d.innerHTML=`<div class="bubble">${text}</div><div class="msg-time">${getTime()}</div>`;
  ca.appendChild(d); ca.scrollTop=ca.scrollHeight;
}

function showTyping(){
  const ca=document.getElementById('chatArea');
  const d=document.createElement('div'); d.id='typing'; d.className='msg mira';
  d.innerHTML='<div class="typing-wrap"><div class="dot t-dot"></div><div class="dot t-dot"></div><div class="dot t-dot"></div></div>';
  ca.appendChild(d); ca.scrollTop=ca.scrollHeight;
}
function hideTyping(){const e=document.getElementById('typing'); if(e)e.remove();}

async function send(){
  const inp=document.getElementById('inp'); const val=inp.value.trim();
  if(!val || busy) return;
  inp.value=''; inp.style.height='auto'; busy=true; document.getElementById('sbtn').disabled=true;
  
  renderUser(val);
  history.push({role:'user', content:val});
  
  try {
    const res = await fetch('/api/chat', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:SYSTEM, messages:history})});
    const data = await res.json();
    history.push({role:'assistant', content:data.reply});
    await renderMira(data.reply);
  } catch(e) { await renderMira("the words got lost in the stars. ✨[BREAK]give me a moment."); }
  
  busy=false; document.getElementById('sbtn').disabled=false;
}

function startChat(m){
  mode=m; history=[];
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('chatscreen').classList.remove('hidden');
  document.getElementById('chatArea').innerHTML='';
  renderMira(m==='talk' ? "i'm all ears. what's happening? ✨" : "tell me the situation. let's find the wisdom in it. 🔍");
}
</script>
</body>
</html>
