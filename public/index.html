<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mira</title>
    <style>
        /* GOOGLE FONTS */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,500;1,600&family=Nunito:wght@300;400;500;600&display=swap');

        /* RESET & CORE */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg: #130a06; 
            --surface: #1e0f08;
            --surface-light: #2a1510;
            --amber: #c8783a; 
            --gold: #e8a870;
            --cream: #f0e4d0;
            --cream-dim: #c8b49a;
            --cream-muted: #8a7464;
            --border: rgba(200, 120, 58, 0.14);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg);
            color: var(--cream);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── DYNAMIC STAR BACKGROUND ── */
        canvas#bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(30px);
        }

        /* ── WELCOME / LANDING ── */
        #welcome {
            padding: 40px 20px;
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        .portrait-container {
            width: 220px;
            height: 220px;
            margin: 0 auto 40px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mira-name {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 52px;
            color: var(--gold);
            margin-bottom: 40px;
            letter-spacing: -1px;
        }

        .option-stack {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .opt-btn {
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: rgba(30, 15, 8, 0.5);
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(12px);
            font-size: 16px;
            font-weight: 500;
            color: var(--cream-dim);
            letter-spacing: 0.5px;
        }

        .opt-btn:hover {
            border-color: var(--amber);
            background: rgba(42, 21, 16, 0.8);
            transform: scale(1.02);
            color: var(--cream);
        }

        /* ── CHAT INTERFACE ── */
        #chatscreen {
            width: 100%;
            max-width: 700px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(19, 10, 6, 0.96);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            z-index: 10;
        }

        .h-identity { display: flex; align-items: center; gap: 15px; }
        .h-avatar-frame {
            width: 46px; height: 46px;
            border-radius: 50%;
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            background: var(--surface);
        }

        .h-label-name { font-family: 'Playfair Display', serif; font-style: italic; font-size: 22px; color: var(--gold); }
        .h-label-status { font-size: 11px; color: #6db87a; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

        .btn-back {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--cream-muted);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-back:hover { border-color: var(--amber); color: var(--gold); }

        .chat-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ── BUBBLES ── */
        .msg { display: flex; flex-direction: column; max-width: 80%; }
        .msg.mira { align-self: flex-start; }
        .msg.user { align-self: flex-end; align-items: flex-end; }

        .bubble {
            padding: 14px 20px;
            border-radius: 20px;
            font-size: 15.5px;
            line-height: 1.6;
        }

        .msg.mira .bubble {
            background: var(--surface-light);
            border: 1px solid rgba(200, 120, 58, 0.08);
            color: var(--cream-dim);
            border-top-left-radius: 4px;
        }

        .msg.user .bubble {
            background: rgba(200, 120, 58, 0.12);
            border: 1px solid rgba(200, 120, 58, 0.2);
            color: var(--cream);
            border-top-right-radius: 4px;
        }

        /* ── TYPING INDICATOR ── */
        .typing-dots { display: flex; gap: 5px; padding: 12px; }
        .dot { width: 6px; height: 6px; background: var(--amber); border-radius: 50%; opacity: 0.3; animation: blink 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* ── INPUT BLOCK ── */
        .input-bar {
            padding: 20px 25px 30px;
            background: rgba(19, 10, 6, 0.98);
            border-top: 1px solid var(--border);
        }

        .input-container {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            background: #1a0d07;
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 12px 12px 12px 24px;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--cream);
            font-family: inherit;
            font-size: 16px;
            line-height: 1.5;
            resize: none;
            max-height: 120px;
        }

        .btn-send {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--amber);
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .btn-send:hover { background: var(--gold); transform: scale(1.05); }
        .btn-send svg { fill: white; width: 20px; height: 20px; }
    </style>
</head>
<body>

    <canvas id="bg"></canvas>

    <div class="screen" id="welcome">
        <div class="portrait-container">
            <svg viewBox="0 0 200 200" width="200" height="200" xmlns="http://www.w3.org/2000/svg">
                <g fill="none" stroke="#e8a870" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M125 45 C100 45 90 45 85 75 C82 90 75 100 70 105 C65 110 75 115 80 120" />
                    <path d="M80 120 C85 125 82 135 80 140 C85 145 95 150 105 155" />
                    <path d="M105 155 Q110 170 115 185" />
                    <path d="M125 45 C155 45 165 75 160 110 C158 130 145 145 145 145 Q150 160 165 180" />
                    <path d="M145 145 Q135 155 140 175" />
                    <path d="M120 110 Q130 105 135 120 Q135 130 125 135" />
                    <path d="M92 90 Q105 88 115 95" stroke-width="1.6" />
                    <path d="M108 108 L112 112 M112 108 L108 112" stroke-width="1.5" /> </g>
            </svg>
        </div>
        <h1 class="mira-name">mira</h1>
        <div class="option-stack">
            <button class="opt-btn" onclick="startChat('talk')">talk</button>
            <button class="opt-btn" onclick="startChat('advice')">need advice</button>
            <button class="opt-btn" onclick="startChat('expert')">psychological insight</button>
        </div>
    </div>

    <div class="screen hidden" id="chatscreen">
        <header class="chat-header">
            <div class="h-identity">
                <div class="h-avatar-frame">
                    <svg viewBox="0 0 100 100" width="28" height="28">
                        <path d="M40 30 Q30 35 32 55 Q35 70 45 78" stroke="#e8a870" stroke-width="3" fill="none"/>
                    </svg>
                </div>
                <div>
                    <div class="h-label-name">mira</div>
                    <div class="h-label-status">online</div>
                </div>
            </div>
            <button class="btn-back" onclick="goHome()">← change</button>
        </header>

        <main class="chat-scroll" id="chatArea"></main>

        <footer class="input-bar">
            <div class="input-container">
                <textarea id="inp" placeholder="Message Mira..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
                <button class="btn-send" id="sbtn" onclick="send()">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </footer>
    </div>

    <script>
        /* ── PROFESSIONAL STAR ENGINE ── */
        (function(){
            const c = document.getElementById('bg'), ctx = c.getContext('2d');
            let W, H, stars = [];
            function init(){
                W = c.width = window.innerWidth; H = c.height = window.innerHeight;
                stars = Array.from({length: 80}, () => ({
                    x: Math.random() * W, y: Math.random() * H,
                    r: Math.random() * 0.8 + 0.2, o: Math.random(),
                    v: Math.random() * 0.002 + 0.0005
                }));
            }
            function draw(){
                ctx.clearRect(0, 0, W, H);
                stars.forEach(s => {
                    const alpha = 0.1 + Math.abs(Math.sin(Date.now() * s.v + s.o) * 0.4);
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(240, 225, 200, ${alpha})`; ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            window.addEventListener('resize', init); init(); draw();
        })();

        /* ── EQ GOD SYSTEM PROMPT ── */
        const SYSTEM = `You are Mira, a world-class EQ expert and psychology strategist. 
        PERSONALITY: Warm, wise, older-sister figure. 
        LANGUAGE: Plain, simple, human language. lowercase. 
        STRATEGY: Deeply explain the 'why' of human behavior (ego, fear, attachment). 
        OUTPUT: 1-3 sentences per bubble. Use [BREAK] for multiple bubbles. 
        EMOJIS: Use ✨, 🕊️, 💙, 🔍 naturally but rarely.`;

        let history = [], busy = false;

        function goHome(){
            document.getElementById('chatscreen').classList.add('hidden');
            document.getElementById('welcome').classList.remove('hidden');
        }

        async function renderMira(text){
            const ca = document.getElementById('chatArea');
            const parts = text.split('[BREAK]').map(p => p.trim()).filter(Boolean);
            
            for(let p of parts){
                const tWrap = document.createElement('div');
                tWrap.id = 'typing'; tWrap.className = 'msg mira';
                tWrap.innerHTML = '<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
                ca.appendChild(tWrap); ca.scrollTop = ca.scrollHeight;
                
                await new Promise(r => setTimeout(r, 1000 + p.length * 15));
                tWrap.remove();

                const g = document.createElement('div'); g.className = 'msg mira';
                g.innerHTML = `<div class="bubble">${p.toLowerCase()}</div>`;
                ca.appendChild(g); ca.scrollTop = ca.scrollHeight;
            }
        }

        async function send(){
            const inp = document.getElementById('inp'); const val = inp.value.trim();
            if(!val || busy) return;
            inp.value = ''; inp.style.height = 'auto'; busy = true;
            
            const g = document.createElement('div'); g.className = 'msg user';
            g.innerHTML = `<div class="bubble">${val}</div>`;
            document.getElementById('chatArea').appendChild(g);
            history.push({role:'user', content:val});

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ system: SYSTEM, messages: history })
                });
                const data = await res.json();
                history.push({role:'assistant', content: data.reply});
                await renderMira(data.reply);
            } catch(e) {
                await renderMira("i'm still here... just taking a breath. 🕊️");
            }
            busy = false;
        }

        function startChat(m){
            history = [];
            document.getElementById('welcome').classList.add('hidden');
            document.getElementById('chatscreen').classList.remove('hidden');
            document.getElementById('chatArea').innerHTML = '';
            const greet = m === 'talk' ? "i'm listening. what's happening? ✨" : "tell me the situation. let's look at the psychology behind it. 🔍";
            renderMira(greet);
        }
    </script>
</body>
</html>
