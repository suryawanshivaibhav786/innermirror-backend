<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InnerMirror · Mira</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Nunito:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#130a06; /* The Warm Chocolate Brown - Restored */
  --surface:#1e0f08;
  --surface2:#2a1510;
  --amber:#c8783a; /* The original cozy amber - Restored */
  --amber-light:#e8a870;
  --cream:#f0e4d0;
  --cream-dim:#c8b49a;
  --cream-muted:#8a7464;
  --text-dim:rgba(230, 226, 233, 0.5);
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;transition:opacity 0.65s ease,transform 0.65s ease;}
.screen.hidden{opacity:0;pointer-events:none;transform:translateY(20px)}

/* ── WELCOME ── */
#welcome{padding:24px;text-align:center;max-width:420px;width:100%;margin:0 auto;}
.mira-hero{position:relative;width:96px;height:96px;margin:0 auto 20px;}
.mira-halo{position:absolute;inset:-10px;border-radius:50%;background:radial-gradient(circle,rgba(200,120,58,0.28) 0%,transparent 70%);animation:halo 3.5s ease-in-out infinite;}
@keyframes halo{0%,100%{transform:scale(1);opacity:0.7}50%{transform:scale(1.1);opacity:1}}
.mira-face{width:96px;height:96px;border-radius:50%;overflow:hidden;position:relative;z-index:1;border:2px solid rgba(200,120,58,0.3);animation:float 5s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

.brand-name{font-family:'Playfair Display',serif;font-size:30px;color:var(--cream);letter-spacing:-0.3px;margin-bottom:2px;}
.brand-name em{font-style:italic;color:var(--amber-light)}
.brand-sub{font-size:11px;color:var(--cream-muted);letter-spacing:1.8px;text-transform:uppercase;margin-bottom:4px;font-weight:400;}
.mira-tagline{font-size:13px;color:rgba(200,180,155,0.55);font-style:italic;font-weight:300;margin-bottom:28px;}
.welcome-q{font-family:'Playfair Display',serif;font-size:18px;color:rgba(230,205,175,0.78);font-style:italic;margin-bottom:22px;line-height:1.55;}

.mcards{display:flex;flex-direction:column;gap:8px;width:100%;}
.mcard{
  padding:13px 16px;border-radius:14px;
  border:1px solid var(--border);
  background:rgba(30,15,8,0.7);
  cursor:pointer;text-align:left;
  transition:all 0.25s;
  display:flex;align-items:center;gap:13px;
  backdrop-filter:blur(10px);
}
.mcard:hover{border-color:var(--border-hover);background:rgba(42,21,16,0.85);transform:translateX(5px);}
.mc-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.mcard:nth-child(1) .mc-icon{background:rgba(200,120,58,0.18)}
.mcard:nth-child(2) .mc-icon{background:rgba(140,100,180,0.18)}
.mcard:nth-child(3) .mc-icon{background:rgba(80,140,180,0.18)}
.mc-t{font-size:13.5px;color:var(--cream-dim);font-weight:600;margin-bottom:1px;}
.mc-h{font-size:11px;color:var(--cream-muted);font-weight:300;}

/* ── CHAT SCREEN ── */
#chatscreen{width:100%;max-width:600px;height:100vh;display:flex;flex-direction:column;}
.chat-header{
  padding:15px 20px; /* Adjusted padding from your screenshot */
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  background:rgba(19,10,6,0.95);
  border-bottom:1px solid rgba(255, 255, 255, 0.04);
  backdrop-filter:blur(16px);
}
.h-left{display:flex;align-items:center;gap:12px;}
.h-avatar{width:38px;height:38px;border-radius:50%;overflow:hidden;position:relative;flex-shrink:0;border:1.5px solid rgba(200,120,58,0.25);}
.h-online{position:absolute;bottom:1px;right:1px;width:9px;height:9px;border-radius:50%;background:#6db87a;border:1.5px solid var(--bg);}
.h-name{font-family:'Playfair Display',serif; font-style: italic; font-size:18px;color:var(--cream);font-weight: 500;} /* Serif Font Restored */
.h-status{font-size:11px;color:var(--text-dim);font-weight:300;} /* Clam Status Restored */
.h-back{font-size:10.5px;padding:4px 11px;border-radius:20px;border:1px solid var(--border);color:var(--cream-muted);cursor:pointer;background:transparent;transition:all 0.2s;}
.h-back:hover{border-color:var(--amber);color:var(--amber-light)}

.chat-area{
  flex:1;overflow-y:auto;
  padding:16px 18px 8px;
  display:flex;flex-direction:column;
}
.chat-area::-webkit-scrollbar{width:3px}
.chat-area::-webkit-scrollbar-thumb{background:rgba(200,120,58,0.12);border-radius:2px}

.msg-group{display:flex;flex-direction:column;margin-bottom:12px;}
.msg-group.mira{align-items:flex-start;}
.msg-group.user{align-items:flex-end;}

.g-avatar{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;}

.bubbles{display:flex;flex-direction:column;gap:3px;max-width:80%;}
.msg-group.user .bubbles{align-items:flex-end;}

.bubble{
  padding:9px 14px;
  border-radius:16px;
  font-size:14.5px;
  line-height:1.6;
}

.msg-group.mira .bubble{
  background:rgba(42,21,16,0.95);
  border:1px solid rgba(200,120,58,0.1);
  color:var(--cream-dim);
  border-top-left-radius: 4px;
}
.msg-group.user .bubble{
  background:rgba(160,80,40,0.18);
  border:1px solid rgba(200,120,58,0.16);
  color:var(--cream);
  border-top-right-radius: 4px;
}

.msg-time{font-size:10px;color:var(--cream-muted);opacity:0.5;margin-top:3px;}

/* Typing */
.typing-group{display:flex;flex-direction:column;align-items:flex-start;margin-bottom:12px;}
.typing-bubble{padding:11px 16px;background:rgba(42,21,16,0.92);border:1px solid rgba(200,120,58,0.1);border-radius:4px 16px 16px 16px;}
.t-dots{display:flex;gap:4px;}
.t-dot{width:5px;height:5px;border-radius:50%;background:var(--amber);opacity:0.4;animation:tdot 1.5s ease infinite;}
.t-dot:nth-child(2){animation-delay:0.22s}.t-dot:nth-child(3){animation-delay:0.44s}
@keyframes tdot{0%,60%,100%{opacity:0.2;transform:scale(0.7)}30%{opacity:0.9;transform:scale(1)}}

/* ── INPUT ── */
.input-section{
  flex-shrink:0;padding:10px 18px 14px;
  background:rgba(19,10,6,0.95);
  border-top:1px solid rgba(200,120,58,0.14);
}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px;}
.chip{font-size:11.5px;padding:5px 12px;border-radius:20px;background:rgba(30,15,8,0.8);border:1px solid rgba(200,120,58,0.14);color:var(--cream-muted);cursor:pointer;transition:all 0.2s;}
.chip:hover{border-color:var(--amber);color:var(--amber-light);background:rgba(42,21,16,0.9);}
.ibox{display:flex;gap:10px;align-items:flex-end;background:rgba(30,15,8,0.85);border:1px solid rgba(200,120,58,0.14);border-radius:24px;padding:9px 9px 9px 18px;}
textarea{flex:1;background:transparent;border:none;outline:none;color:var(--cream);font-family:inherit;font-size:14.5px;line-height:1.5;resize:none;min-height:22px;max-height:110px;}
textarea::placeholder{color:rgba(138,116,100,0.45)}
.send-btn{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--amber-light),#a05820);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.send-btn svg{width:15px;height:15px;fill:white;}
.send-btn:disabled{opacity:0.28;}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="screen" id="welcome">
  <div style="padding:24px;text-align:center;max-width:420px;width:100%;margin:0 auto;">
    <div class="mira-hero">
      <div class="mira-halo"></div>
      <div class="mira-face">
        <svg viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <clipPath id="circW"><circle cx="48" cy="48" r="48"/></clipPath>
          </defs>
          <circle cx="48" cy="48" r="48" fill="#1e0d06"/>
          <g clip-path="url(#circW)">
            <ellipse cx="48" cy="110" rx="40" ry="18" fill="#8a3820"/> <ellipse cx="48" cy="55" rx="26" ry="30" fill="#c07840"/> <ellipse cx="48" cy="35" rx="30" ry="22" fill="#3a1a08"/> <path d="M40 35 Q48 20 56 35" stroke="#3a1a08" stroke-width="2" fill="none"/>
            <path d="M42 45 Q48 40 54 45" stroke="#3a1a08" stroke-width="1.8" fill="none"/> <ellipse cx="44" cy="52" rx="4.5" ry="3.5" fill="#2a1408"/> <ellipse cx="52" cy="52" rx="4.5" ry="3.5" fill="#2a1408"/>
            <path d="M43 68 Q48 72 53 68" stroke="#a06840" stroke-width="1.5" fill="none"/> </g>
        </svg>
      </div>
    </div>
    <div class="brand-name">inner<em>mirror</em></div>
    <div class="brand-sub">meet mira</div>
    <div class="mira-tagline">your warm, emotionally intelligent companion</div>
    <div class="welcome-q">"What's on your heart today?"</div>
    <div class="mcards">
      <div class="mcard" onclick="startChat('feel')">
        <div class="mc-icon">🌙</div>
        <div><div class="mc-t">I just need to talk</div><div class="mc-h">No agenda. Just someone who gets it.</div></div>
      </div>
      <div class="mcard" onclick="startChat('words')">
        <div class="mc-icon">💬</div>
        <div><div class="mc-t">I don't know what to say</div><div class="mc-h"> help me find language that feels true and human.</div></div>
      </div>
    </div>
  </div>
</div>

<div class="screen hidden" id="chatscreen">
  <div class="chat-header">
    <div class="h-left">
      <div class="h-avatar">
        <svg viewBox="0 0 38 38" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <clipPath id="circH"><circle cx="19" cy="19" r="19"/></clipPath>
          </defs>
          <circle cx="19" cy="19" r="19" fill="#1e0d06"/>
          <g clip-path="url(#circH)">
            <ellipse cx="19" cy="40" rx="15" ry="8" fill="#8a3820"/>
            <ellipse cx="19" cy="22" rx="10" ry="12" fill="#c07840"/>
            <ellipse cx="19" cy="14" rx="12" ry="9" fill="#3a1a08"/>
            <ellipse cx="16" cy="22" rx="2" ry="1.5" fill="#2a1408"/>
            <ellipse cx="22" cy="22" rx="2" ry="1.5" fill="#2a1408"/>
            <path d="M16 30 Q19 32 22 30" stroke="#a06840" stroke-width="1.2" fill="none"/>
          </g>
        </svg>
        <div class="h-online"></div>
      </div>
      <div>
        <div class="h-name">Mira</div>
        <div class="h-status" id="statusText">online</div>
      </div>
    </div>
    <button class="h-back" onclick="goHome()">← change</button>
  </div>
  <div class="chat-area" id="chatArea"></div>
  <div class="input-section">
    <div class="chips" id="chips"></div>
    <div class="ibox">
      <textarea id="inp" placeholder="Message Mira…" rows="1" onkeydown="onKey(event)" oninput="resize(this)"></textarea>
      <button class="send-btn" id="sbtn" onclick="send()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
/* ── BACKGROUND ── */
(function(){
  const c=document.getElementById('bg'),ctx=c.getContext('2d');
  let W,H,t=0,stars=null;
  function init(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;stars=null;}
  function draw(){
    ctx.clearRect(0,0,W,H);
    if(!stars)stars=Array.from({length:90},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*0.9+0.1,o:Math.random()*0.35+0.05,s:Math.random()*0.005+0.001,p:Math.random()*Math.PI*2}));
    stars.forEach(s=>{const o=s.o+Math.sin(t*s.s+s.p)*0.12;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(240,210,170,${o})`;ctx.fill();});
    t++;requestAnimationFrame(draw);
  }
  window.addEventListener('resize',init);init();draw();
})();

const BASE=`You are Mira — a warm, emotionally intelligent companion. Tone: simple, smart, lowercase, matching a real friend's WhatsApp style. 
SHORT messages — 1 to 3 sentences max. Use [BREAK] to split thoughts. 
Never say "I understand." Instead, observe the feeling.`;

const MODES={
  feel:{
    extra:`Mode: Just listening. Don't rush to insight. Just be there.`,
    status:'online • just listening 🌙',
    welcome:`hey 🌙 i'm mira.[BREAK]whatever brought you here — you don't need to explain it perfectly.[BREAK]i'm here. what's going on?`,
    chips:["i've been feeling off","something happened","i'm exhausted"]
  },
  words:{
    extra:`Mode: Help them find language that feels true and human.`,
    status:'online • finding the words 💬',
    welcome:`sometimes words just won't come 💙[BREAK]who do you need to talk to?`,
    chips:["saying no","setting a limit","confessing a feeling"]
  }
};

let mode='feel',history=[],busy=false;

function getTime(){const n=new Date();return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');}
function goHome(){document.getElementById('chatscreen').classList.add('hidden');document.getElementById('welcome').classList.remove('hidden');history=[];}
function resize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px'}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}

function miraAvatarSVG(){
  return `<svg viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg"><clipPath id="cc2"><circle cx="14" cy="14" r="14"/></clipPath><circle cx="14" cy="14" r="14" fill="#1e0d06"/><g clip-path="url(#cc2)"><ellipse cx="14" cy="28" rx="10" ry="5" fill="#8a3820"/><ellipse cx="14" cy="16" rx="7" ry="8" fill="#c07840"/><ellipse cx="14" cy="9" rx="8" ry="6" fill="#3a1a08"/><ellipse cx="11" cy="16.5" rx="2" ry="1.5" fill="#2a1408"/><ellipse cx="17" cy="16.5" rx="2" ry="1.5" fill="#2a1408"/><path d="M11 23 Q14 25 17 23" stroke="#a06840" stroke-width="1" fill="none"/></g></svg>`;
}

async function renderMira(text){
  const ca=document.getElementById('chatArea');
  const parts=text.split('[BREAK]').map(p=>p.trim()).filter(Boolean);

  for(let i=0; i<parts.length; i++){
    showTyping();
    // Simulate thinking/typing time based on length
    await new Promise(r => setTimeout(r, 800 + (parts[i].length * 15)));
    hideTyping();

    const group=document.createElement('div');
    group.className='msg-group mira';
    
    // Minimalist single-column WhatsApp style
    group.innerHTML=`<div class="bubbles"><div class="bubble">${parts[i].toLowerCase().replace(/\*(.*?)\*/g,'<em>$1</em>')}</div></div>`;

    if(i === parts.length - 1) {
      const tm=document.createElement('div'); tm.className='msg-time'; tm.textContent=getTime();
      group.appendChild(tm);
    }

    ca.appendChild(group);
    ca.scrollTop=ca.scrollHeight;
    if(i < parts.length - 1) await new Promise(r => setTimeout(r, 400));
  }
}

function renderUser(text){
  const ca=document.getElementById('chatArea');
  const group=document.createElement('div'); group.className='msg-group user';
  group.innerHTML=`<div class="bubbles"><div class="bubble">${text}</div></div><div class="msg-time">${getTime()}</div>`;
  ca.appendChild(group);
  ca.scrollTop=ca.scrollHeight;
}

function showTyping(){
  const ca=document.getElementById('chatArea');
  const wrap=document.createElement('div'); wrap.className='typing-group mira'; wrap.id='typing';
  wrap.innerHTML=`<div class="bubbles"><div class="typing-bubble"><div class="t-dots"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div></div></div>`;
  ca.appendChild(wrap); ca.scrollTop=ca.scrollHeight;
}
function hideTyping(){const el=document.getElementById('typing'); if(el)el.remove();}

async function send(){
  const inp=document.getElementById('inp'); const text=inp.value.trim();
  if(!text||busy)return;
  inp.value=''; inp.style.height='auto';
  busy=true; document.getElementById('sbtn').disabled=true;
  renderUser(text);
  history.push({role:'user',content:text});
  try{
    const system=BASE+'\n\nMODE:\n'+MODES[mode].extra;
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system,messages:history})});
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    history.push({role:'assistant',content:data.reply});
    await renderMira(data.reply);
  }catch(e){
    await renderMira("something went quiet on my end 🥺[BREAK]i'm still here though.");
  }
  busy=false; document.getElementById('sbtn').disabled=false;
}

function startChat(m){
  mode=m; history=[];
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('chatscreen').classList.remove('hidden');
  document.getElementById('statusText').textContent=MODES[m].status;
  document.getElementById('chatArea').innerHTML='<div class="date-tag">Today</div>';
  renderMira(MODES[mode].welcome);
}
</script>
</body>
</html>
