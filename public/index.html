<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>InnerMirror</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #141a2e, #0b0f1a);
  color: #fff;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
  font-size: 34px;
  font-family: 'Playfair Display', serif;
  letter-spacing: 1px;
  color: #e6e9ff;
  text-shadow: 0 0 15px rgba(100,120,255,0.5);
}

/* EMOTION BAR */
.emotion-bar {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  padding: 10px;
}

.emotion {
  padding: 6px 14px;
  border-radius: 20px;
  background: rgba(40,50,90,0.6);
  cursor: pointer;
  font-size: 13px;
  transition: 0.2s;
}

.emotion:hover {
  background: rgba(80,100,200,0.6);
}

/* CHAT AREA */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

/* CARDS */
.card {
  background: rgba(20, 26, 46, 0.7);
  backdrop-filter: blur(10px);
  border-radius: 14px;
  padding: 15px;
  margin-bottom: 12px;
  border: 1px solid rgba(80,100,200,0.2);
  animation: fadeIn 0.4s ease;
}

.card-title {
  font-size: 13px;
  opacity: 0.6;
  margin-bottom: 5px;
}

/* BUTTONS */
.actions {
  display: flex;
  gap: 10px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.btn {
  background: rgba(80,100,200,0.3);
  padding: 6px 12px;
  border-radius: 10px;
  font-size: 12px;
  cursor: pointer;
  transition: 0.2s;
}

.btn:hover {
  background: rgba(120,140,255,0.5);
}

/* INPUT */
.input-box {
  display: flex;
  padding: 10px;
  border-top: 1px solid rgba(255,255,255,0.05);
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.05);
  color: white;
}

button {
  margin-left: 10px;
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  background: #5a6cff;
  color: white;
  cursor: pointer;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(8px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="header">InnerMirror</div>

<div class="emotion-bar">
  <div class="emotion" onclick="quick('I feel confused')">Confused</div>
  <div class="emotion" onclick="quick('I feel hurt')">Hurt</div>
  <div class="emotion" onclick="quick('I am overthinking')">Overthinking</div>
  <div class="emotion" onclick="quick('I feel attached')">Attached</div>
  <div class="emotion" onclick="quick('I feel angry')">Angry</div>
</div>

<div class="chat" id="chat"></div>

<div class="input-box">
  <input id="input" placeholder="What's on your mind..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
async function sendMessage(messageOverride) {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const message = messageOverride || input.value;
  if (!message) return;

  input.value = "";

  chat.innerHTML += `
    <div class="card">
      <div class="card-title">You</div>
      ${message}
    </div>
  `;

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message })
  });

  const data = await res.json();
  const reply = data.reply || "Something went wrong";

  const parts = reply.split("\\n\\n");

  chat.innerHTML += `
    <div class="card">
      <div class="card-title">🧠 Insight</div>
      ${parts[0] || reply}
    </div>
    <div class="card">
      <div class="card-title">🔍 Pattern</div>
      ${parts[1] || "There may be a deeper pattern here."}
    </div>
    <div class="card">
      <div class="card-title">💬 What You Can Say</div>
      ${parts[2] || "Take a moment before responding calmly."}
    </div>

    <div class="actions">
      <div class="btn" onclick="sendMessage('Go deeper into this')">Go deeper</div>
      <div class="btn" onclick="sendMessage('Why do I feel this?')">Why do I feel this?</div>
      <div class="btn" onclick="sendMessage('What should I say?')">What should I say?</div>
    </div>
  `;

  chat.scrollTop = chat.scrollHeight;
}

function quick(text) {
  sendMessage(text);
}
</script>

</body>
</html>
