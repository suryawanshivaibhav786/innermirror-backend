<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InnerMirror · Mira</title>
<style>
/* Clean Sans-Serif Fonts - Like WA/Insta */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital@1&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  /* Dusk & Champagne Palette - Muted, not vibrant */
  --bg: #141116; 
  --surface: #1d1921;
  --surface-tint: rgba(232, 210, 200, 0.03);
  
  --mira-bubble: #26212b; /* Deep Dusk */
  --mira-text: #e8e2e9;
  
  --user-bubble: #e8dcc8; /* Muted Champagne/Linen */
  --user-text: #26212b;

  --accent: #d4c0ab; /* Champagne gold for subtle accents */
  --accent-muted: rgba(212, 192, 171, 0.5);
  --text-dim: rgba(232, 226, 233, 0.5);
}

body {
  font-family: 'Inter', sans-serif;
  background-color: var(--bg);
  /* Calm, static twilight gradient */
  background-image: linear-gradient(145deg, #18141c 0%, #110e13 100%);
  color: var(--mira-text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.5s ease, transform 0.5s ease;
  z-index: 2;
}

.screen.hidden { opacity: 0; pointer-events: none; transform: translateY(15px); }

/* ── WELCOME ── */
#welcome { padding: 30px; text-align: center; }

.mira-hero { margin-bottom: 30px; }
.mira-halo { display: none; } /* Removed glowy halo */

/* New "Pretty" Line-Art Face */
.mira-face-holder {
  width: 110px; height: 110px;
  border-radius: 50%;
  border: 1px solid var(--accent-muted);
  background: linear-gradient(135deg, #1d1921 0%, #141116 100%);
  margin: 0 auto;
  display: flex; align-items: center; justify-content: center;
}

.brand-name { font-family: 'Playfair Display', serif; font-style: italic; font-size: 34px; color: var(--user-bubble); letter-spacing: -1px; margin-bottom: 5px; }
.brand-sub { font-size: 11px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; font-weight: 500; }
.mira-tagline { font-size: 14px; color: var(--text-dim); font-weight: 300; margin-bottom: 40px; max-width: 280px; }

.mcards { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 350px; }
.mcard {
  padding: 16px 20px;
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.04);
  background: var(--surface-tint);
  cursor: pointer; text-align: left;
  transition: all 0.3s;
}
.mcard:hover { border-color: var(--accent); background: rgba(255, 255, 255, 0.06); }
.mc-t { font-size: 14px; color: var(--mira-text); font-weight: 500; margin-bottom: 3px; }
.mc-h { font-size: 12px; color: var(--text-dim); font-weight: 300; }

/* ── CHAT SCREEN ── */
#chatscreen { width: 100%; max-width: 600px; height: 100vh; display: flex; flex-direction: column; }

.chat-header {
  padding: 15px 20px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  background: rgba(20, 17, 22, 0.95);
  border-bottom: 1px solid rgba(255, 255, 255, 0.04);
  backdrop-filter: blur(10px);
}
.h-left { display: flex; align-items: center; gap: 12px; }
.h-avatar { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; position: relative; border: 1px solid var(--accent-muted); }
.h-online { position: absolute; bottom: 2px; right: 2px; width: 9px; height: 9px; border-radius: 50%; background: #6db87a; border: 1.5px solid var(--bg); }
.h-name { font-size: 16px; color: var(--mira-text); font-weight: 500; }
.h-status { font-size: 11px; color: var(--text-dim); font-weight: 300; }
.h-back { font-size: 11px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--accent-muted); color: var(--accent); cursor: pointer; background: transparent; transition: all 0.2s; }
.h-back:hover { border-color: var(--accent); background: rgba(255, 255, 255, 0.05); }

.chat-area {
  flex: 1; overflow-y: auto;
  padding: 20px 20px 10px;
  display: flex; flex-direction: column;
}
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.05); border-radius: 2px; }

.date-tag { text-align: center; font-size: 11px; color: var(--text-dim); margin: 15px auto 20px; font-weight: 300; }

/* ── MESSAGE FLOW ── */
.msg-group { display: flex; flex-direction: column; margin-bottom: 15px; max-width: 85%; }
.msg-group.mira { align-items: flex-start; align-self: flex-start; }
.msg-group.user { align-items: flex-end; align-self: flex-end; }

/* Clean matte bubbles - Like Insta/WA Dusk */
.bubble {
  padding: 11px 16px;
  font-size: 15px;
  line-height: 1.5;
  border-radius: 18px;
  transition: all 0.3s;
}

.msg-group.mira .bubble {
  background-color: var(--mira-bubble);
  color: var(--mira-text);
  border-top-left-radius: 4px;
}

.msg-group.user .bubble {
  background-color: var(--user-bubble);
  color: var(--user-text);
  border-top-right-radius: 4px;
}

.msg-time { font-size: 10px; color: var(--text-dim); opacity: 0.7; margin-top: 5px; padding: 0 5px; }

/* ── INPUT ── */
.input-section {
  flex-shrink: 0; padding: 15px 20px;
  background: rgba(20, 17, 22, 0.95);
  border-top: 1px solid rgba(255, 255, 255, 0.04);
}
.ibox { display: flex; gap: 12px; align-items: flex-end; }
textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--mira-text); font-family: inherit; font-size: 15px; line-height: 1.5; resize: none; min-height: 22px; max-height: 100px; }
textarea::placeholder { color: var(--text-dim); }
.send-btn { width: 36px; height: 36px; border-radius: 50%; background-color: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.send-btn svg { width: 16px; height: 16px; fill: var(--user-text); }
.send-btn:disabled { opacity: 0.3; }
.fnote { text-align: center; font-size: 10px; color: var(--text-dim); margin-top: 10px; font-weight: 300; }

/* Typing Dots - Cleaned Up */
.typing-wrap { padding: 12px 18px; background-color: var(--mira-bubble); border-radius: 4px 18px 18px 18px; width: fit-content; margin-bottom: 15px; }
.t-dots { display: flex; gap: 5px; }
.t-dot { width: 6px; height: 6px; border-radius: 50%; background-color: var(--accent); opacity: 0.4; animation: tdot 1.4s ease infinite; }
.t-dot:nth-child(2) { animation-delay: 0.2s; } .t-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes tdot { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }
</style>
</head>
<body>

<div class="screen" id="welcome">
  <div class="mira-hero">
    <div class="mira-face-holder">
      <svg viewBox="0 0 100 100" width="80" height="80" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="artGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#e8dcc8" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#e8dcc8" stop-opacity="0.2"/>
          </linearGradient>
        </defs>
        <path d="M50 20 Q40 30 42 45 Q44 60 55 70 Q60 75 58 85" stroke="url(#artGrad)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M45 25 Q30 35 35 55 Q40 70 48 75" stroke="#d4c0ab" stroke-width="1" fill="none" opacity="0.4"/>
        <circle cx="65" cy="35" r="1.5" fill="#e8dcc8"/>
        <path d="M65 30 L65 40 M60 35 L70 35" stroke="#e8dcc8" stroke-width="0.8"/>
      </svg>
    </div>
  </div>
  <div class="brand-name">inner mirror</div>
  <div class="brand-sub">meet mira</div>
  <div class="mira-tagline">your warm, emotionally intelligent companion</div>
  <div class="mcards">
    <div class="mcard" onclick="startChat('feel')">
      <div class="mc-t">i just need to talk</div>
      <div class="mc-h">no agenda. just someone who gets it.</div>
    </div>
    <div class="mcard" onclick="startChat('words')">
      <div class="mc-t">i don't know what to say</div>
      <div class="mc-h">help me find language for a hard talk.</div>
    </div>
  </div>
</div>

<div class="screen hidden" id="chatscreen">
  <div class="chat-header">
    <div class="h-left">
      <div class="h-avatar">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 25 Q42 35 44 48 Q46 60 55 68 Q58 72 57 80" stroke="#e8dcc8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <path d="M62 38 L62 46 M58 42 L66 42" stroke="#e8dcc8" stroke-width="1.5"/>
        </svg>
        <div class="h-online"></div>
      </div>
      <div>
        <div class="h-name">Mira</div>
        <div class="h-status" id="statusText">online</div>
      </div>
    </div>
    <button class="h-back" onclick="goHome()">← change</button>
  </div>
  <div class="chat-area" id="chatArea"></div>
  <div class="input-section">
    <div class="ibox">
      <textarea id="inp" placeholder="Message Mira…" rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
      <button class="send-btn" id="sbtn" onclick="send()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="fnote">companion, not a therapist.</div>
  </div>
</div>

<script>
const BASE=`You are Mira — a warm, emotionally intelligent companion. 
Rules: Use lowercase. Be direct but warm. Reply like a best friend. 
SHORT messages — 1 to 3 sentences max. Use [BREAK] to split thoughts. 
Never say "I understand." Instead, describe the feeling.`;

const MODES={
  feel:{
    extra:`Mode: Just listening. Follow their lead.`,
    status:'online • just listening 🌙',
    welcome:`hey 🌙 i'm mira.[BREAK]whatever brought you here — you don't need to explain it perfectly.[BREAK]i'm here. what's going on?`,
  },
  words:{
    extra:`Mode: Help them find the right words. Give 2 options.`,
    status:'online • finding the words 💬',
    welcome:`sometimes words just won't come 💙[BREAK]who do you need to talk to?`,
  }
};

let mode='feel',history=[],busy=false;

function getTime(){const n=new Date();return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');}
function goHome(){document.getElementById('chatscreen').classList.add('hidden');document.getElementById('welcome').classList.remove('hidden');history=[];}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}

async function renderMira(text){
  const ca=document.getElementById('chatArea');
  const parts=text.split('[BREAK]').map(p=>p.trim()).filter(Boolean);

  for(let i=0; i<parts.length; i++){
    showTyping();
    // Use length-based human typing delay
    await new Promise(r => setTimeout(r, 600 + (parts[i].length * 12)));
    hideTyping();

    const group=document.createElement('div');
    group.className='msg-group mira';
    group.innerHTML=`<div class="bubbles"><div class="bubble">${parts[i].toLowerCase().replace(/\*(.*?)\*/g,'<em>$1</em>')}</div></div>`;

    if(i === parts.length - 1) {
      const tm=document.createElement('div'); tm.className='msg-time'; tm.textContent=getTime();
      group.appendChild(tm);
    }

    ca.appendChild(group);
    ca.scrollTop=ca.scrollHeight;
    if(i < parts.length - 1) await new Promise(r => setTimeout(r, 400));
  }
}

function renderUser(text){
  const ca=document.getElementById('chatArea');
  const group=document.createElement('div'); group.className='msg-group user';
  group.innerHTML=`<div class="bubbles"><div class="bubble">${text}</div></div><div class="msg-time">${getTime()}</div>`;
  ca.appendChild(group);
  ca.scrollTop=ca.scrollHeight;
}

function showTyping(){
  const ca=document.getElementById('chatArea');
  const wrap=document.createElement('div'); wrap.className='msg-group mira'; wrap.id='typing';
  wrap.innerHTML=`<div class="bubbles"><div class="typing-wrap"><div class="t-dots"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div></div></div>`;
  ca.appendChild(wrap); ca.scrollTop=ca.scrollHeight;
}
function hideTyping(){const el=document.getElementById('typing'); if(el)el.remove();}

async function send(){
  const inp=document.getElementById('inp'); const text=inp.value.trim();
  if(!text||busy)return;
  inp.value=''; inp.style.height='auto';
  busy=true; document.getElementById('sbtn').disabled=true;
  renderUser(text);
  history.push({role:'user',content:text});
  try{
    // Simplified placeholder logic
    const system=BASE+'\n\nMODE:\n'+MODES[mode].extra;
    const parts = ["yeah, that's heavy. ✨", "like you're exhausted carrying it all alone."];
    for(let p of parts) {
      await new Promise(r => setTimeout(r, 800 + (p.length * 10)));
      renderMira(p);
    }
  }catch(e){ await renderMira("something went quiet on my end 🥺[BREAK]i'm still here though."); }
  busy=false; document.getElementById('sbtn').disabled=false;
}

function startChat(m){
  mode=m; history=[];
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('chatscreen').classList.remove('hidden');
  document.getElementById('statusText').textContent=MODES[m].status;
  document.getElementById('chatArea').innerHTML='<div class="date-tag">Today</div>';
  renderMira(MODES[mode].welcome);
}
</script>
</body>
</html>
